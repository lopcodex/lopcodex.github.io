<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Front-end developer portfolio with real smart links system."/>
<title>Lopcodex | FAANG Level Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter;
}

body{
  background: radial-gradient(circle at top,#0b0f17,#05070c);
  color:#e6e6e6;
  overflow-x:hidden;
}

header{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(10,14,25,.7);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(79,156,255,.15);
  z-index:999;
}

nav{
  display:flex;
  justify-content:space-between;
  padding:18px 10%;
}

nav h1{
  font-size:18px;
  color:#fff;
}

nav ul{
  display:flex;
  gap:18px;
  list-style:none;
}

nav ul li a{
  opacity:.7;
  transition:.2s;
  text-decoration:none;
  color:#fff;
}

nav ul li a:hover{
  opacity:1;
  color:#4f9cff;
}

.hero{
  padding:140px 10% 60px;
}

.hero h2{
  font-size:44px;
  background:linear-gradient(90deg,#fff,#4f9cff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

section{
  padding:70px 10%;
}

.card{
  background:rgba(10,14,25,.7);
  border:1px solid rgba(79,156,255,.15);
  padding:20px;
  border-radius:12px;
  margin-top:15px;
}

.btn{
  display:inline-flex;
  padding:12px 16px;
  border-radius:10px;
  margin-top:10px;
  background:linear-gradient(90deg,#4f9cff,#6ee7ff);
  color:#000;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
  user-select:none;
}

.btn:active{ transform:scale(.95); }

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

img{
  width:100%;
  border-radius:12px;
}
</style>
</head>

<body>

<header>
<nav>
<h1>Lopcodex</h1>
<ul>
<li><a href="#about">About</a></li>
<li><a href="#github">GitHub</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>
</header>

<section class="hero">
<h2>Front-End Developer</h2>
<p>FAANG-level portfolio system with smart app detection links.</p>
</section>

<section id="about">
<div class="card">
<h3>About</h3>
<p>Building real interfaces with modern UI and production mindset.</p>
</div>
</section>

<!-- GITHUB -->
<section id="github">
<div class="card">
<h3>GitHub Profile</h3>

<img src="https://github-profile-summary-cards.vercel.app/api/cards/profile-details?username=lopcodex&theme=radical"/>

</div>

<div class="grid">

<div class="card">
<img src="https://github-readme-stats.vercel.app/api?username=lopcodex&show_icons=true&theme=radical"/>
</div>

<div class="card">
<img src="https://github-readme-stats.vercel.app/api/top-langs/?username=lopcodex&layout=compact&theme=radical"/>
</div>

</div>
</section>

<!-- CONTACT -->
<section id="contact">

<div class="card">
<h3>Contact System</h3>

<div class="btn" onclick="openSmart('mail')">Open Email</div>
<div class="btn" onclick="openSmart('ig')">Open Instagram</div>
<div class="btn" onclick="openSmart('discord')">Open Discord</div>
<div class="btn" onclick="openSmart('github')">Open GitHub</div>

</div>

</section>

<script>
function openSmart(app){

  let deepLinks = {
    mail: {
      app: "mailto:jplby10@gmail.com",
      web: "mailto:jplby10@gmail.com"
    },

    ig: {
      app: "instagram://user?username=lopcodex",
      web: "https://www.instagram.com/lopcodex"
    },

    discord: {
      app: "discord://-/users/1517174797333692436",
      web: "https://discord.com/users/1517174797333692436"
    },

    github: {
      app: "github://user?username=lopcodex",
      web: "https://github.com/lopcodex"
    }
  };

  let link = deepLinks[app];

  // tenta abrir app
  window.location.href = link.app;

  // fallback automático
  setTimeout(()=>{
    window.location.href = link.web;
  },1200);
}
</script>

</body>
</html>
